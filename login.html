
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Capital Login</title>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

height:100vh;
background:
radial-gradient(circle at top,#1c1600,#050505);
display:flex;
justify-content:center;
align-items:center;

color:white;

}



.login-box{

width:380px;
background:#111;
padding:40px;
border-radius:20px;
border:1px solid #333;
box-shadow:0 0 30px rgba(212,175,55,.2);
text-align:center;


}



.logo{

font-size:35px;
font-weight:bold;
color:#d4af37;
margin-bottom:20px;

}

h2{

margin-bottom:25px;

}



input{

width:100%;
padding:15px;
margin:12px 0;
background:#050505;
border:1px solid #333;
border-radius:10px;

color:white;
outline:none;

}



button{

width:100%;
padding:15px;
margin-top:20px;
background:#d4af37;
border:none;
border-radius:30px;
font-weight:bold;

cursor:pointer;

}



button:hover{

transform:scale(1.05);

}



a{

color:#d4af37;
text-decoration:none;

}



.links{

margin-top:20px;
color:#aaa;

}

</style>

</head>



<body>


<div class="login-box">


<div class="logo">
APEX CAPITAL
</div>


<h2>
Trader Login
</h2>



<input type="email" placeholder="Email Address">


<input type="password" placeholder="Password">

<button>
Login
</button>



<div class="links">

<p>
Forgot password?
</p>

<br>

<p>
Don't have an account?

<a href="register.html">
Register
</a>
</p>


</div>



</div>


</body>

</html>
