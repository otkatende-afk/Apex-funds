
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Capital | Become a Funded Trader</title>

<style>

*{
    margin:0;
    padding:0;

    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#050505;
    color:white;
}


/* NAVBAR */

nav{
    width:100%;
    padding:20px 8%;

    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#090909;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#d4af37;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:15px;
}

.nav-links a:hover{
    color:#d4af37;
}



/* HERO */

.hero{


    min-height:90vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:50px 8%;
    background:
    radial-gradient(circle at top,#1c1600,#050505 50%);

}


.hero h1{

    font-size:65px;
    max-width:900px;
    line-height:1.1;

}


.gold{
    color:#d4af37;
}


.hero p{

    margin-top:25px;
    font-size:20px;

    color:#bbbbbb;
    max-width:700px;

}


.buttons{

    margin-top:40px;

}


.btn{

    display:inline-block;

    padding:15px 35px;
    margin:10px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;

}


.primary{

    background:#d4af37;
    color:black;

}



.secondary{

    border:2px solid #d4af37;
    color:#d4af37;

}


.btn:hover{

    transform:scale(1.08);

}



/* PROFIT BOX */

.stats{

    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:60px;
    flex-wrap:wrap;

}


.stat{


    background:#111;
    padding:25px 40px;
    border-radius:15px;
    border:1px solid #222;

}


.stat h2{

    color:#00ff88;
    font-size:35px;

}


.stat p{

    font-size:14px;

}



/* MOBILE */

@media(max-width:700px){

.hero h1{

font-size:40px;


}

nav{

padding:20px;

}

.nav-links{

display:none;

}

}



</style>

</head>


<body>


<nav>

<div class="logo">
APEX CAPITAL
</div>


<div class="nav-links">

<a href="#">Home</a>
<a href="#">Challenges</a>
<a href="#">Rules</a>
<a href="#">Login</a>

</div>

</nav>



<section class="hero">


<div>


<h1>
Pass The Challenge.
<br>
Get <span class="gold">Funded.</span>
</h1>


<p>
Trade your strategy, prove your discipline,
and earn a funded account 

with up to
<strong>95% profit share.</strong>
</p>



<div class="buttons">

<a class="btn primary" href="#">
Get Started
</a>


<a class="btn secondary" 

href="#">
Free Trial
</a>

</div>



<div class="stats">


<div class="stat">

<h2>95%</h2>
<p>Profit Share</p>

</div>



<div class="stat">

<h2>$100K</h2>
<p>Maximum Funding</p>

</div>



<div class="stat">

<h2>24/7</h2>

<p>Trader Support</p>

</div>


</div>


</div>


</section>



</body>

</html>
