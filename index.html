
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Capital Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{
background:#101010;
color:white;
display:flex;
}

.sidebar{
width:220px;
height:100vh;
background:#000;
padding:20px;
}

.sidebar h2{

color:#FFD700;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:8px 0;
border-radius:8px;
}

.sidebar a:hover{
background:#FFD700;
color:black;

}

.main{
flex:1;
padding:30px;
background:#151515;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{

color:#FFD700;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:12px;
color:white;

}

.green{
background:#00b050;
}

.red{
background:#d62828;
}

.yellow{
background:#d4a017;
color:black;
}

.progress{

background:#333;
height:10px;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#00ff88;
width:70%;
}

table{
width:100%;
border-collapse:collapse;

margin-top:20px;
}

th{
background:#FFD700;
color:black;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #444;
}

.buy{
color:#00ff88;

font-weight:bold;
}

.sell{
color:#ff4444;
font-weight:bold;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>APEX CAPITAL</h2>

<a href="#">Dashboard</a>

<a href="#">Accounts</a>
<a href="#">Certificates</a>
<a href="#">Payouts</a>
<a href="#">Leaderboard</a>
<a href="#">Support</a>

</div>

<div class="main">

<div class="header">
<h1>Trading Dashboard</h1>
</div>

<div class="cards">

<div class="card green">
<h3>Balance</h3>
<h2>$100,000</h2>
</div>

<div class="card yellow">
<h3>Equity</h3>
<h2>$101,350</h2>
</div>

<div class="card red">
<h3>Daily Loss</h3>
<h2>-1.25%</h2>
</div>

<div class="card green">

<h3>Profit Target</h3>
<h2>7%</h2>

<div class="progress">
<div class="fill"></div>
</div>

</div>

</div>

<h2>Recent Trades</h2>

<table>

<tr>

<th>Pair</th>
<th>Type</th>
<th>Profit</th>
</tr>

<tr>
<td>EURUSD</td>
<td class="buy">BUY</td>
<td>+$240</td>
</tr>

<tr>
<td>XAUUSD</td>
<td class="sell">SELL</td>
<td>-$110</td>
</tr>


<tr>
<td>GBPJPY</td>
<td class="buy">BUY</td>
<td>+$530</td>
</tr>

</table>

</div>

</body>
</html>
