
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Capital Register</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

height:100vh;
background:radial-gradient(circle at top,#1c1600,#050505);
display:flex;
justify-content:center;
align-items:center;

color:white;

}


.register-box{

width:400px;
background:#111;
padding:40px;
border-radius:20px;
border:1px solid #333;
box-shadow:0 0 30px rgba(212,175,55,.2);
text-align:center;

}


.logo{

font-size:35px;
font-weight:bold;
color:#d4af37;
margin-bottom:20px;

}



input{

width:100%;
padding:15px;
margin:10px 0;
background:#050505;
border:1px solid #333;
border-radius:10px;
color:white;

}



button{

width:100%;
padding:15px;

margin-top:20px;
background:#d4af37;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;

}



button:hover{

transform:scale(1.05);

}




a{

color:#d4af37;
text-decoration:none;

}



</style>

</head>


<body>


<div class="register-box">


<div class="logo">
APEX CAPITAL
</div>


<h2>Create Trader Account</h2>

<input type="text" placeholder="Full Name">


<input type="email" placeholder="Email Address">


<input type="password" placeholder="Create Password">


<input type="password" placeholder="Confirm Password">


<button>
Create Account
</button>


<br><br>


<p>
Already have an account?
<a href="login.html">
Login
</a>
</p>


</div>


</body>

</html>
