<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | Apex Capital</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="payment-container">

<h1>Complete Your Order</h1>

<p>Secure checkout powered by Apex Capital</p>

<div class="payment-summary">

<h2>Order Summary</h2>

<p>
Challenge
<span id="payment-plan">$5K Evaluation</span>
</p>

<p>
Amount
<span id="payment-price">$49</span>
</p>

<hr>

<h3>
Total
<span id="payment-total">$49</span>
</h3>

</div>

<div class="payment-methods">

<h2>Select Payment Method</h2>
<div class="method-card">

<h3>₿ Crypto</h3>

<p>
Pay using USDT (TRC20), Bitcoin or Ethereum.
</p>

<button class="payment-option">
Select Crypto
</button>

</div>

<div class="method-card">

<h3>📱 Mobile Money</h3>

<p>
Pay using MTN MoMo or Airtel Money.
</p>

<button class="payment-option">
Select Mobile Money
</button>

</div>


</div>

<button class="pay-now-btn">
Pay Securely →
</button>

<p class="secure">
🔒 256-bit SSL Secure Checkout
</p>

</div>

<script src="script.js"></script>

</body>

</html>
