<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | Apex Capital</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="payment-container">

<h1>Complete Your Order</h1>

<p>Secure checkout powered by Apex Capital</p>

<div class="payment-summary">

<h2>Order Summary</h2>

<p>
Challenge
<span id="payment-plan">$5K Evaluation</span>
</p>

<p>
Amount
<span id="payment-price">$49</span>
</p>

<hr>

<h3>
Total
<span id="payment-total">$49</span>
</h3>

</div>

<div class="payment-methods">

<h2>Select Payment Method</h2>

<button class="payment-option">
💳 Credit / Debit Card
</button>

<button class="payment-option">
₿ Crypto
</button>

<button class="payment-option">
📱 Mobile Money
</button>

</div>

<button class="pay-now-btn">
Pay Securely →
</button>

<p class="secure">
🔒 256-bit SSL Secure Checkout
</p>

</div>

<script src="script.js"></script>

</body>

</html>
